<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Les GIFS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #1a1a2e;
    min-height: 100vh; min-height: 100dvh;
    padding: 12px;
    color: #fff;
    overflow-x: hidden;
  }
  h1 { font-size: clamp(14px, 4vw, 20px); font-weight: 700; color: #fff; text-shadow: 0 0 10px #ffcb05; }

  /* START SCREEN */
  #start-screen {
    position: fixed; inset: 0; background: #1a1a2e;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 300; gap: 20px; padding: 24px;
  }
  #start-screen h2 { font-size: clamp(24px, 8vw, 36px); font-weight: 700; color: #ffcb05; text-shadow: 0 0 20px #ffcb05; text-align: center; }
  #start-screen p { font-size: clamp(13px, 3.5vw, 15px); color: #aaa; text-align: center; max-width: 320px; line-height: 1.6; }
  #btn-start {
    background: #ffcb05; border: none; border-radius: 12px;
    padding: clamp(12px, 3vw, 14px) clamp(32px, 8vw, 48px);
    font-size: clamp(16px, 4vw, 18px); font-weight: 700;
    cursor: pointer; color: #1a1a2e; font-family: inherit;
    touch-action: manipulation;
    box-shadow: 0 0 24px rgba(255,203,5,0.4);
  }
  #btn-start:active { transform: scale(0.97); }

  /* LEVEL TRANSITION SCREEN */
  #level-screen {
    position: fixed; inset: 0; background: #1a1a2e;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 300; gap: 16px; padding: 24px;
  }
  #level-screen .lvl-num { font-size: clamp(13px, 3.5vw, 18px); color: #aaa; text-transform: uppercase; letter-spacing: 3px; }
  #level-screen .lvl-name { font-size: clamp(28px, 9vw, 40px); font-weight: 700; color: #ffcb05; text-shadow: 0 0 20px #ffcb05; text-align: center; }
  #level-screen .lvl-info { font-size: clamp(12px, 3vw, 14px); color: #888; }
  #btn-lvl-start {
    background: #ffcb05; border: none; border-radius: 12px;
    padding: clamp(10px, 2.5vw, 12px) clamp(28px, 7vw, 40px);
    font-size: clamp(14px, 4vw, 16px); font-weight: 700;
    cursor: pointer; color: #1a1a2e; font-family: inherit;
    touch-action: manipulation;
    box-shadow: 0 0 20px rgba(255,203,5,0.3);
    margin-top: 8px;
  }
  #btn-lvl-start:active { transform: scale(0.97); }

  /* HEADER */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; flex-wrap: wrap; gap: 6px;
  }
  #stats { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .sb {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 4px 10px; font-size: clamp(11px, 2.8vw, 13px); color: #ccc;
  }
  .sb b { color: #ffcb05; font-weight: 600; }
  #tb {
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 4px 10px; font-size: clamp(11px, 2.8vw, 13px); color: #ccc;
  }
  #tb b { color: #ffcb05; font-weight: 600; }
  #tb.urg b { color: #e74c3c; }

  /* LEVEL PROGRESS BAR */
  #level-bar {
    display: flex; gap: 5px; margin-bottom: 10px; justify-content: center;
  }
  .lvl-dot {
    width: clamp(24px, 6vw, 32px); height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.15); transition: background 0.3s;
  }
  .lvl-dot.done { background: #2ecc71; }
  .lvl-dot.active { background: #ffcb05; }

  /* GRID */
  #grid {
    display: grid; gap: 6px;
    width: 100%; max-width: 560px; margin: 0 auto;
  }
  .card { aspect-ratio: 1; cursor: pointer; perspective: 800px; touch-action: manipulation; }
  .ci {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
    transition: transform 0.45s ease;
    -webkit-transition: -webkit-transform 0.45s ease;
  }
  .card.fl .ci, .card.mt .ci {
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
  }
  .cf, .cb {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 8px; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15);
  }
  .cf {
    background: linear-gradient(135deg, #1a3a6b 0%, #0d1f3c 100%);
    display: flex; align-items: center; justify-content: center;
    z-index: 2;
  }
  .cf svg { width: 55%; height: 55%; }
  .cb {
    background: #111;
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
    display: flex; align-items: center; justify-content: center;
  }
  .cb img { width: 100%; height: 100%; object-fit: contain; display: block; background: #111; }
  .card.mt .cb { border-color: #2ecc71; box-shadow: 0 0 8px #2ecc71; }

  /* MODAL */
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    align-items: center; justify-content: center; z-index: 100;
    padding: 20px;
  }
  #overlay.show { display: flex; }
  #modal {
    background: #16213e; border: 1px solid rgba(255,203,5,0.4);
    border-radius: 16px; padding: 1.5rem; text-align: center;
    max-width: 360px; width: 100%;
    box-shadow: 0 0 40px rgba(255,203,5,0.15);
  }
  #modal h2 { font-size: clamp(18px, 5vw, 24px); margin-bottom: 10px; color: #ffcb05; }
  #modal p { font-size: clamp(13px, 3.5vw, 14px); color: #aaa; margin-bottom: 1.2rem; line-height: 1.6; }
  #modal button {
    background: #ffcb05; border: none; border-radius: 8px;
    padding: 12px 28px; font-size: clamp(14px, 4vw, 15px); font-weight: 700;
    cursor: pointer; color: #1a1a2e; font-family: inherit;
    touch-action: manipulation; width: 100%;
  }
  #modal button:active { opacity: 0.85; }

  /* BIRTHDAY */
  #birthday {
    display: none; text-align: center;
    margin-top: 24px; padding: 0 10px;
  }
  #birthday .bday-msg {
    font-size: clamp(26px, 7vw, 42px); font-weight: 700; color: #ffcb05;
    text-shadow: 0 0 20px #ffcb05, 0 0 40px #ff6b6b;
    animation: pulse 1s ease-in-out infinite alternate;
    line-height: 1.3; margin-bottom: 24px;
  }
  #birthday .bday-gifs {
    display: flex; justify-content: center; align-items: center;
    gap: clamp(10px, 3vw, 24px); flex-wrap: wrap; margin-bottom: 16px;
  }
  #birthday .bday-gifs img {
    width: clamp(80px, 22vw, 140px); height: clamp(80px, 22vw, 140px);
    object-fit: contain; border-radius: 12px;
    border: 2px solid rgba(255,203,5,0.3);
  }
  #birthday .bday-sub { font-size: clamp(12px, 3vw, 15px); color: #aaa; margin-top: 8px; }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
  }
  @keyframes confetti-fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .confetti-piece {
    position: fixed; width: 10px; height: 10px; top: -20px;
    animation: confetti-fall linear forwards;
    pointer-events: none; z-index: 9999; border-radius: 2px;
  }
</style>
</head>

  <path d="M4 50 A46 46 0 0 1 96 50 Z" fill="#e74c3c"/>
  <rect x="4" y="46" width="92" height="8" fill="#2c2c2c"/>
  <circle cx="50" cy="50" r="14" fill="white" stroke="#2c2c2c" stroke-width="4"/>

</svg>`;

let currentLevel = 0;
let fl = [], matched = 0, mv = 0, ok = true, tl = 0, ti = null;
let totalTime = 0;

function fmt(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function playSound(url) { const a = new Audio(url); a.play().catch(()=>{}); }

function buildLevelBar() {
  const bar = document.getElementById('level-bar');
  bar.innerHTML = '';
  LEVELS.forEach((l, i) => {
    const d = document.createElement('div');
    d.className = 'lvl-dot' + (i < currentLevel ? ' done' : i === currentLevel ? ' active' : '');
    bar.appendChild(d);
  });
}

function startGame() {
  playSound(SND_START);
  document.getElementById('start-screen').style.display = 'none';
  showLevelScreen(0);
}

function showLevelScreen(idx) {
  currentLevel = idx;
  const lvl = LEVELS[idx];
  document.getElementById('ls-num').textContent = `Niveau ${lvl.num} / 7`;
  document.getElementById('ls-name').textContent = lvl.name;
  document.getElementById('ls-info').textContent = `${lvl.pairs} paires — ${lvl.time} secondes`;
  document.getElementById('level-screen').style.display = 'flex';
  buildLevelBar();
  if (lvl.num === 2) playSound(SND_LVL2);
  else if (lvl.num === 3) playSound(SND_LVL3);
  else if (lvl.num === 4) playSound(SND_LVL4);
  else if (lvl.num === 5) playSound(SND_LVL5);
  else if (lvl.num === 6) playSound(SND_LVL6);
  else if (lvl.num === 7) playSound(SND_LVL7);
}

function launchLevel() {
  playSound(SND_START);
  const lvl = LEVELS[currentLevel];
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('level-screen').style.display = 'none';
  document.getElementById('birthday').style.display = 'none';
  document.getElementById('game-title').textContent = `⚡ Niveau ${lvl.num} — ${lvl.name}`;
  document.getElementById('pc').textContent = `0/${lvl.pairs}`;
  document.getElementById('mc').textContent = '0';
  document.getElementById('tb').classList.remove('urg');
  buildLevelBar();
  fl = []; matched = 0; mv = 0; ok = true;
  tl = lvl.time;
  document.getElementById('tm').textContent = fmt(tl);
  buildGrid(lvl);
  startTimer();
}

function buildGrid(lvl) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  if (lvl.birthday) {
    buildBirthdayGrid(lvl);
    return;
  }

  const maxW = '580px';
  grid.style.gridTemplateColumns = `repeat(${lvl.cols}, minmax(100px, 1fr))`;
  grid.style.maxWidth = maxW;
  grid.style.position = '';
  grid.style.height = '';

  const deck = shuffle([...lvl.imgs.map((_,i)=>i), ...lvl.imgs.map((_,i)=>i)]);
  deck.forEach(origIdx => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.orig = origIdx;
    card.innerHTML = `<div class="ci">
      <div class="cf">${PB}</div>
      <div class="cb"><img src="${lvl.imgs[origIdx]}" alt="" loading="lazy"/></div>
    </div>`;
    card.addEventListener('click', () => flip(card));
    grid.appendChild(card);
  });
}

function buildBirthdayGrid(lvl) {
  const grid = document.getElementById('grid');

  // Taille dynamique selon largeur écran
  const screenW = Math.min(window.innerWidth, 600);
  const S = Math.max(60, Math.floor((screenW - 24) / 7) - 6 + 8);
  const G = Math.max(4, Math.floor(S * 0.07));
  const U = S + G;

  const TWO = [
    [0,0],[1,0],
    [1,1],
    [0,2],[1,2],
    [0,3],
    [0,4],[1,4]
  ];
  const FIVE = [
    [0,0],[1,0],
    [0,1],
    [0,2],[1,2],
    [1,3],
    [0,4],[1,4]
  ];
  const EXCL4 = [[0,0],[0,1],[0,2],[0,4]];

  const colOffset2 = 0;
  const colOffset5 = 3;
  const colOffset8 = 6;

  const positions = [
    ...TWO.map(([c,r]) => [c + colOffset2, r]),
    ...FIVE.map(([c,r]) => [c + colOffset5, r]),
    ...EXCL4.map(([c,r]) => [c + colOffset8, r])
  ];

  const totalW = (colOffset8 + 1) * U - G;
  const totalH = 5 * U + G;

  grid.style.position = 'relative';
  grid.style.height = totalH + 'px';
  grid.style.width = totalW + 'px';
  grid.style.maxWidth = 'none';
  grid.style.gridTemplateColumns = '';
  grid.style.display = 'block';
  grid.style.margin = '0 auto';

  // Si le grid dépasse l'écran, on centre avec scroll
  const wrapper = document.getElementById('birthday-grid-wrapper');
  if (wrapper) wrapper.style.display = 'block';

  const deck = shuffle([...lvl.imgs.map((_,i)=>i), ...lvl.imgs.map((_,i)=>i)]);

  positions.forEach(([col, row], idx) => {
    const origIdx = deck[idx];
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.orig = origIdx;
    card.style.position = 'absolute';
    card.style.left = (col * U) + 'px';
    card.style.top  = (row * U) + 'px';
    card.style.width  = S + 'px';
    card.style.height = S + 'px';
    card.innerHTML = `<div class="ci">
      <div class="cf">${PB}</div>
      <div class="cb"><img src="${lvl.imgs[origIdx]}" alt="" loading="lazy"/></div>
    </div>`;
    card.addEventListener('click', () => flip(card));
    grid.appendChild(card);
  });
}

function flip(card) {
  if (!ok || card.classList.contains('fl') || card.classList.contains('mt')) return;
  card.classList.add('fl');
  playSound(SND_FLIP);
  fl.push(card);
  if (fl.length === 2) { mv++; document.getElementById('mc').textContent = mv; check(); }
}

function check() {
  ok = false;
  const [a, b] = fl;
  const lvl = LEVELS[currentLevel];
  if (a.dataset.orig === b.dataset.orig) {
    a.classList.add('mt'); b.classList.add('mt');
    matched++;
    document.getElementById('pc').textContent = `${matched}/${lvl.pairs}`;
    fl = []; ok = true;
    if (matched === lvl.pairs) {
      clearInterval(ti);
      const timeUsed = lvl.time - tl;
      totalTime += timeUsed;
      playSound(SND_WIN);
      setTimeout(() => levelWon(), 400);
    } else {
      playSound(SND_PAIR);
    }
  } else {
    playSound(SND_WRONG);
    setTimeout(() => { a.classList.remove('fl'); b.classList.remove('fl'); fl = []; ok = true; }, 900);
  }
}

function startTimer() {
  clearInterval(ti);
  ti = setInterval(() => {
    tl--;
    document.getElementById('tm').textContent = fmt(tl);
    document.getElementById('tb').classList.toggle('urg', tl <= 10);
    if (tl <= 0) {
      clearInterval(ti);
      playSound(SND_LOSE);
      levelLost();
    }
  }, 1000);
}

function levelWon() {
  const lvl = LEVELS[currentLevel];
  const isLast = currentLevel === LEVELS.length - 1;
  if (isLast) {
    showModal('🎉 Félicitations !',
      `Niveau terminé en ${fmt(lvl.time - tl)} !<br><br>Temps total : <b style="color:#ffcb05">${fmt(totalTime)}</b>`,
      'Continuer', () => showBirthday());
  } else {
    showModal('✅ Niveau réussi !',
      `Niveau ${lvl.num} terminé en ${fmt(lvl.time - tl)} !`,
      'Niveau suivant ▶', () => showLevelScreen(currentLevel + 1));
  }
}

function levelLost() {
  const lvl = LEVELS[currentLevel];
  showModal('⏰ Temps écoulé !',
    `${matched}/${lvl.pairs} paires trouvées.<br>Recommence ce niveau !`,
    'Réessayer', () => launchLevel());
}

function showModal(title, text, btnTxt, action) {
  document.getElementById('rp-title').textContent = title;
  document.getElementById('rp-text').innerHTML = text;
  document.getElementById('rp-btn').textContent = btnTxt;
  window._modalAction = action;
  document.getElementById('result-panel').style.display = 'block';
  document.getElementById('result-panel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function modalAction() {
  document.getElementById('result-panel').style.display = 'none';
  if (window._modalAction) window._modalAction();
}

function showBirthday() {
  document.getElementById('grid').innerHTML = '';
  document.getElementById('birthday').style.display = 'block';
  document.getElementById('bday-time').textContent = `Temps total : ${fmt(totalTime)}`;
  playSound(SND_BDAY);
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#ffcb05','#e74c3c','#2ecc71','#3498db','#9b59b6','#ff69b4','#fff'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (2 + Math.random() * 3) + 's';
      c.style.animationDelay = (Math.random() * 2) + 's';
      c.style.width = (8 + Math.random() * 8) + 'px';
      c.style.height = (8 + Math.random() * 8) + 'px';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 6000);
    }, i * 40);
  }
}

</script>
</body>
